<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Blog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .page-header {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
        }
        .top-menu {
            color: #fff;
            text-decoration: none;
        }
        .top-menu:hover {
            text-decoration: underline;
        }
        .font-changer {
            margin: 20px 0;
        }
        .post {
            border-bottom: 1px solid #ccc;
            padding: 20px;
        }
        .date {
            color: #666;
        }
        .post a {
            color: #333;
            text-decoration: none;
        }
        .post a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="page-header">
        {% if user.is_authenticated %}
        <a href="{% url 'post_new' %}" class="top-menu">
            Add New Post
        </a>
        {% endif %}
    </div>
    <div class="font-changer">
        <label for="fontSelector">Select Font:</label>
        <select id="fontSelector" onchange="changeFont()">
            <option value="Arial, sans-serif">Arial</option>
            <option value="Verdana, sans-serif">Verdana</option>
            <option value="Roboto, sans-serif">Roboto</option>
            <option value="Helvetica, sans-serif">Helvetica</option>
            <option value="Georgia, serif">Georgia</option>
            <option value="Times New Roman, serif">Times New Roman</option>
            <option value="Courier New, monospace">Courier New</option>
        </select>
    </div>

    <div class="posts">
        {% block content %}
            {% for post in posts %}
                <div class="post">
                    <div class="date">{{ post.published_date }}</div>
                    <h1><a href="{% url 'post_detail' pk=post.pk %}">{{ post.title }}</a></h1>
                    <p>{{ post.text|linebreaksbr }}</p>
                    <a href="{% url 'post_detail' pk=post.pk %}">Comments: {{ post.approved_comments.count }}</a>
                </div>
            {% endfor %}
        {% endblock content %}
    </div>

    <script>
        function changeFont() {
            var selectedFont = document.getElementById("fontSelector").value;
            var contentElements = document.querySelectorAll(".post, .post h1, .post p, .post a");
            contentElements.forEach(function(element) {
                element.style.fontFamily = selectedFont;
            });
        }
    </script>
</body>
</html>
